[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
# Local Cartesi devnet (sunodo / cartesi-cli default)
localhost = "http://localhost:8545"

[etherscan]
localhost = { key = "none", url = "http://localhost:8545" }
